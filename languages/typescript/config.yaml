file_extensions:
  - ts
  - tsx
class_patterns:
  - class_declaration
  - interface_declaration
function_patterns:
  - method_definition
  - function_declaration
variable_patterns:
  - public_field_definition
  - field_definition
  - variable_declarator
identifier_patterns:
  - identifier
  - property_identifier
  - type_identifier
type_patterns:
  - type_annotation
  - primitive_type
parameter_container_patterns:
  - formal_parameters
parameter_patterns:
  - required_parameter
  - optional_parameter
wrapper_patterns:
  - lexical_declaration
  - variable_declaration
skip_patterns: []
import_patterns:
  - import_statement
namespace_patterns: []
visibility_modifier_patterns:
  - accessibility_modifier
private_by_default: false
public_modifier_patterns: 
  - public
private_modifier_patterns:
  - private
  - protected